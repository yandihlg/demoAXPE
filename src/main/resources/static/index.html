<!DOCTYPE html>
<html>
<head>
    <title>Hotel Search</title>
    <script>
        async function performSearch() {
            const payload = {
                hotelId: "1234aBc",
                checkIn: "29/12/2023",
                checkOut: "31/12/2023",
                ages: [30, 29, 1, 3]
            };
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('searchId').innerText = data.searchId;
                } else {
                    console.error('Error in response:', response.statusText);
                }
            } catch (error) {
                console.error('Error performing search:', error);
            }
        }

        async function getCount() {
            const searchId = document.getElementById('searchId').innerText;
            if (!searchId) {
                console.error('Search ID is not available');
                return;
            }

            try {
                const response = await fetch(`/search/count?searchId=${searchId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                } else {
                    console.error('Error in response:', response.statusText);
                }
            } catch (error) {
                console.error('Error getting count:', error);
            }
        }
    </script>
</head>
<body>
    <button onclick="performSearch()">Perform Search</button>
    <p>Search ID: <span id="searchId"></span></p>
    <button onclick="getCount()">Get Count</button>
    <pre id="result"></pre>
</body>
</html>
